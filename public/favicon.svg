<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo arredondado branco (app-icon style) -->
  <rect width="32" height="32" rx="7" fill="#ffffff"/>

  <!--
    Anel segmentado em 4 arcos (gaps de 10° nos pontos cardeais):
    Seg 1 — superior-direito  (5°  → 85°)
    Seg 2 — inferior-direito  (95° → 175°)
    Seg 3 — inferior-esquerdo (185°→ 265°)
    Seg 4 — superior-esquerdo (275°→ 355°) — mais claro, como no logo original

    R externo = 14 | R interno = 9 | Centro (16,16)
    Ângulos medidos do topo (12h), sentido horário.
    Pontos calculados: x = 16 + R·sin(θ)  y = 16 − R·cos(θ)
  -->

  <!-- Segmento 1 (superior-direito) -->
  <path d="M17.22 2.05 A14 14 0 0 1 29.95 14.78 L24.97 15.22 A9 9 0 0 0 16.78 7.03 Z"
        fill="#6366f1"/>

  <!-- Segmento 2 (inferior-direito) -->
  <path d="M29.95 17.22 A14 14 0 0 1 17.22 29.95 L16.78 24.97 A9 9 0 0 0 24.97 16.78 Z"
        fill="#6366f1"/>

  <!-- Segmento 3 (inferior-esquerdo) -->
  <path d="M14.78 29.95 A14 14 0 0 1 2.05 17.22 L7.03 16.78 A9 9 0 0 0 15.22 24.97 Z"
        fill="#6366f1"/>

  <!-- Segmento 4 (superior-esquerdo) — opacidade reduzida como no logo -->
  <path d="M2.05 14.78 A14 14 0 0 1 14.78 2.05 L15.22 7.03 A9 9 0 0 0 7.03 15.22 Z"
        fill="#6366f1" fill-opacity="0.42"/>

  <!-- Checkmark centralizado -->
  <path d="M10 16.5 L14 20 L22 12"
        stroke="#6366f1" stroke-width="2.2"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
